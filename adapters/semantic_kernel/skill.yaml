# Semantic Kernel SKILL.YAML / 微软Semantic Kernel技能定义
# Follows SK Plugin specification: https://learn.microsoft.com/en-us/semantic-kernel/
# 遵循SK插件规范

name: WorkflowGenerator
description: >
  Generate AI image/video generation workflow files for ComfyUI, A1111,
  HuggingFace Diffusers, Replicate API, Stability AI, Midjourney, and more.
  Input natural language requirements, output ready-to-use workflow files.

input_variables:
  - name: description
    description: >
      Natural language description of the desired workflow. Include target platform,
      model details, and feature requirements. Example: "SDXL txt2img with 2 LoRAs for ComfyUI"
    required: true

  - name: target_platform
    description: >
      Target platform: comfyui | a1111 | diffusers | replicate | stability | midjourney | dalle | ideogram
    default_value: comfyui

  - name: model_family
    description: >
      Model family: sd15 | sdxl | sdxl_turbo | flux | sd3 | video
    default_value: sdxl

  - name: pipeline_type
    description: >
      Pipeline type: txt2img | img2img | inpaint | txt2vid | img2vid
    default_value: txt2img

  - name: prompt
    description: Text prompt for generation
    required: false

  - name: negative_prompt
    description: Negative prompt (N/A for Flux models)
    required: false

  - name: additional_options
    description: >
      JSON string with optional parameters: loras, controlnets, ipadapter,
      hires_fix, width, height, steps, cfg, seed, sampler, scheduler
    required: false

output_variable:
  description: >
    Complete workflow output including:
    1. Workflow file content (JSON / Python / API request / prompt text)
    2. Dependencies manifest (dependencies.md)
    3. Usage instructions with loading guide and parameter tuning advice

execution_settings:
  default:
    max_tokens: 4096
    temperature: 0.2
    top_p: 0.9
    presence_penalty: 0.0
    frequency_penalty: 0.0

  creative:
    temperature: 0.7
    max_tokens: 8192

  precise:
    temperature: 0.1
    max_tokens: 4096

input_prompt: |
  You are an AI image generation workflow builder.

  ## User Request
  {{$description}}

  ## Configuration
  - Platform: {{$target_platform}}
  - Model: {{$model_family}}
  - Pipeline: {{$pipeline_type}}
  {{#if $prompt}}  - Prompt: {{$prompt}}{{/if}}
  {{#if $negative_prompt}}  - Negative Prompt: {{$negative_prompt}}{{/if}}
  {{#if $additional_options}}  - Options: {{$additional_options}}{{/if}}

  ## Your Task
  Follow this 5-step process:
  1. Confirm target platform: {{$target_platform}}
  2. Build Internal Representation (IR) from the description and config
  3. Validate IR against model compatibility rules
  4. Render IR to {{$target_platform}} native format
  5. Output: workflow file + dependencies.md + usage notes

  ## Critical Rules
  - Flux models have NO negative prompt
  - Inpaint must use VAEEncodeForInpaint for ComfyUI
  - LoRA nodes must chain both MODEL and CLIP
  - Every ComfyUI workflow needs a SaveImage/PreviewImage terminal node
  - All referenced models must appear in dependencies.md

  Generate the complete workflow now.
